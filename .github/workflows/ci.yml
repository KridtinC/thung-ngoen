name: CI

# Verify the app compiles on every pull request to main.
on:
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        run: bun test

      - name: Type-check (server + lib + tests)
        run: bun run typecheck

      - name: Compile-check server
        run: bun build server.ts --target bun --outfile /tmp/server.build.js

      - name: Build client bundle (also type-resolves shared lib/* imports)
        run: bun build src/client/index.ts --target browser --outfile /tmp/app.build.js
